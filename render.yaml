# render.yaml - Web Service unico (free tier)
# Bot loop roda em background thread dentro do proprio web service

services:
  - type: web
    name: binance-futures-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_MODE
        value: paper
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: BASE_URL
        value: https://demo-fapi.binance.com
      - key: WS_BASE_URL
        value: wss://fstream.binancefuture.com
      - key: SYMBOLS
        value: BTCUSDT,ETHUSDT,SOLUSDT
      - key: INTERVAL
        value: 5m
      - key: RISK_PER_TRADE
        value: "0.01"
      - key: MAX_DAILY_DRAWDOWN
        value: "0.05"
      - key: MAX_LEVERAGE
        value: "5"
      - key: PAPER_BALANCE
        value: "10000.0"
      - key: BOT_INTERVAL_SECONDS
        value: "300"
      - key: LOG_LEVEL
        value: INFO
